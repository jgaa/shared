name: Flatpak

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "proto/**"
      - "flatpak/**"
      - ".github/workflows/flatpak.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - "proto/**"
      - "flatpak/**"
      - ".github/workflows/flatpak.yml"

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read app version from CMake
        id: version
        run: |
          app_version="$(sed -nE 's/^project\(shared_desktop VERSION ([^ ]+) LANGUAGES CXX\)$/\1/p' desktop/CMakeLists.txt)"
          if [ -z "${app_version}" ]; then
            echo "Failed to read VERSION from desktop/CMakeLists.txt" >&2
            exit 1
          fi
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "bundle_name=shared-${app_version}.flatpak" >> "$GITHUB_OUTPUT"

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime and SDK
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-kde-6.10-${{ runner.os }}
          restore-keys: |
            flatpak-kde-6.10-

      - name: Install KDE Platform 6.10 and SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.kde.Platform//6.10 \
            org.kde.Sdk//6.10

      - name: Cache flatpak-builder state
        uses: actions/cache@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('flatpak/local.shared.Shared.yaml') }}-${{ github.sha }}
          restore-keys: |
            flatpak-builder-${{ hashFiles('flatpak/local.shared.Shared.yaml') }}-

      - name: Build Flatpak bundle
        env:
          BUNDLE_NAME: ${{ steps.version.outputs.bundle_name }}
        run: |
          flatpak-builder \
            --repo=repo \
            --force-clean \
            --default-branch=main \
            --user \
            builddir \
            flatpak/local.shared.Shared.yaml
          flatpak build builddir test -f /app/share/metainfo/eu.lastviking.shared.metainfo.xml
          flatpak build builddir test -f /app/share/applications/eu.lastviking.shared.desktop
          flatpak build-bundle repo "${BUNDLE_NAME}" eu.lastviking.shared main

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: shared-flatpak-${{ steps.version.outputs.app_version }}
          path: ${{ steps.version.outputs.bundle_name }}
          retention-days: 14
